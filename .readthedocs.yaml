version: 2

build:
  os: ubuntu-22.04
  apt_packages:
    - graphviz          # provides `dot` for sphinx.ext.graphviz (ET-pathway figure)
  tools:
    python: "3.9"

python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

formats: []
