name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Run test suite (Python ${{ matrix.python-version }}, NumPy ${{ matrix.numpy-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        numpy-version: ["<2", ">=2"]
        exclude:
          - python-version: "3.9"
            numpy-version: ">=2"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install '.[bmi]' pytest "numpy${{ matrix.numpy-version }}"

      - name: Run tests
        run: python -m pytest tests/ -v

  tests-jit:
    name: Run test suite with the Numba JIT (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package, Numba, and a compatible NumPy
        # Numba trails NumPy by a few releases. Pin NumPy to the range Numba
        # supports so `import numba` succeeds and the JIT time loop actually
        # compiles — otherwise the model silently falls back to pure Python
        # and the JIT path goes untested.
        run: pip install '.[bmi]' pytest numba 'numpy<2.3'

      - name: Run tests (Numba JIT path exercised)
        run: python -m pytest tests/ -v
