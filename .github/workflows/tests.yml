name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Run test suite (Python ${{ matrix.python-version }}, NumPy ${{ matrix.numpy-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        numpy-version: ["<2", ">=2"]
        exclude:
          - python-version: "3.9"
            numpy-version: ">=2"

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install '.[bmi]' pytest "numpy${{ matrix.numpy-version }}"

      - name: Run tests
        run: python -m pytest tests/ -v
